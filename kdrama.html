<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>K-Drama Player Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0c0c1f 0%, #1a0a2a 100%);
      color: white;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    .sidebar {
      width: 340px;
      background: rgba(15, 15, 40, 0.95);
      backdrop-filter: blur(25px);
      padding: 35px 25px;
      overflow-y: auto;
      border-right: 1px solid rgba(255, 100, 180, 0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      background: linear-gradient(45deg, #ff66b3, #ff99cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .kdrama-item {
      margin-bottom: 20px;
      cursor: pointer;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid transparent;
      transition: 0.3s;
    }

    .kdrama-item:hover {
      border-color: #ff66b3;
      transform: scale(1.02);
    }

    .kdrama-item.active {
      border-color: #ff66b3;
      box-shadow: 0 0 20px rgba(255,102,179,0.5);
    }

    .kdrama-poster {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }

    .kdrama-info {
      padding: 10px;
      background: rgba(0,0,0,0.6);
    }

    .kdrama-title {
      font-size: 16px;
      font-weight: 600;
    }

    .player {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .player-header {
      padding: 20px;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .current-title {
      font-size: 20px;
      font-weight: 600;
    }

    .status {
      background: #ff66b3;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
    }

    .player-video {
      flex: 1;
      background: black;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 40vh;
      }

      .player {
        height: 60vh;
      }
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="header">
      <h1>🌟 K-Dramas</h1>
    </div>

    <!-- DRAMA 1 -->
    <div class="kdrama-item active"
         data-src="https://vidmoly.net/embed-abmj9ckkl01a.html"
         data-title="Besando Al Hermano Equivocado">

      <img class="kdrama-poster"
           src="https://m.media-amazon.com/images/M/MV5BNGYyNmExZTEtMzY2MS00N2RiLWJjN2QtM2Q4OTYyYzA4MWE5XkEyXkFqcGc@._V1_QL75_UY281_CR11,0,190,281_.jpg">

      <div class="kdrama-info">
        <div class="kdrama-title">Besando Al Hermano Equivocado</div>
      </div>
    </div>

    <!-- EJEMPLO DRAMA EXTRA -->
    <div class="kdrama-item"
         data-src="https://vidmoly.net/embed-2b94i3v7wxzc.html"
         data-title="De Guerrera a Esposa del CEO">

      <img class="kdrama-poster"
           src="https://i.imgur.com/7b1KQ8k.jpg">

      <div class="kdrama-info">
        <div class="kdrama-title">De Guerrera a Esposa del CEO</div>
      </div>
    </div>

  </div>

  <!-- PLAYER -->
  <div class="player">
    <div class="player-header">
      <div class="current-title" id="currentTitle">
        Besando Al Hermano Equivocado
      </div>
      <div class="status">▶ Reproduciendo</div>
    </div>

    <div class="player-video">
      <iframe id="playerFrame"
              src="https://vidmoly.net/embed-abmj9ckkl01a.html"
              allowfullscreen
              allow="autoplay; fullscreen">
      </iframe>
    </div>
  </div>

  <script>
    const items = document.querySelectorAll('.kdrama-item');
    const playerFrame = document.getElementById('playerFrame');
    const currentTitle = document.getElementById('currentTitle');

    items.forEach(item => {
      item.addEventListener('click', () => {

        items.forEach(i => i.classList.remove('active'));
        item.classList.add('active');

        playerFrame.src = item.dataset.src;
        currentTitle.textContent = item.dataset.title;
      });
    });
  </script>

</body>
</html>
